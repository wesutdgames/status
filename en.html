<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>የባቡር እንቅስቃሴ ሁኔታ - NS & EW</title>

<style>
/* ===== RESET & BASE ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Roboto, 'Arial', sans-serif;
  background: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  gap: 30px;
  padding: 20px;
}

/* ===== WELCOME BANNER ===== */
#welcomeBanner {
  width: 100%;
  max-width: 1000px;
  background: #F7AE05;
  border-radius: 50px;
  padding: 16px 24px;
  font-size: 1.6rem;
  color: white;
  text-align: center;
  font-weight: 600;
  box-shadow: 0 15px 25px -10px rgba(0,50,80,0.2);
  transition: 0.2s;
}

/* ===== STATUS BOX ===== */
.status-box {
  position: relative;
  background: white;
  border-radius: 30px;
  width: 480px;
  max-width: 90vw;
  display: flex;
  overflow: hidden;
  transition: all 0.25s ease;
  box-shadow: 0 20px 35px -10px rgba(0,30,40,0.3);
}

.status-box:hover {
  transform: translateY(-6px);
}

/* LABEL */
.status-label {
  width: 28%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
  padding: 20px 8px;
}

/* NS */
#trainNS .status-label {
  background: #0924ED;
}

/* EW */
#trainEW .status-label {
  background: #05F714;
}

/* MESSAGE */
.status-message {
  width: 72%;
  padding: 24px 18px;
  text-align: center;
}

/* STATUS COLORS */
.operating .status-message { color: #0f7b3a; }
.stopped .status-message { color: #c0392b; }
.finished .status-message { color: #1f618d; }
.returning .status-message { color: #d35400; }
.construction .status-message { color: #884ea0; }

/* ===== BLINKING RED DOT ===== */
.status-dot {
  position: absolute;
  top: 14px;
  right: 18px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #ff3b3b;
  box-shadow: 0 0 12px #ff0000, 0 0 24px #ff4444;
  animation: pulse 0.8s infinite alternate;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.3); opacity: 1; }
}

/* RESPONSIVE */
@media (max-width: 500px) {
  .status-box { flex-direction: column; }
  .status-label { width: 100%; }
  .status-message { width: 100%; }
}
</style>
</head>

<body>

<div id="welcomeBanner">Welcome to Addis Ababa Light Rail</div>

<!-- NS -->
<div class="status-box operating" id="trainNS">
  <div class="status-label">North South Line</div>
  <div class="status-message" id="statusMsgNS">Loading...</div>
</div>

<!-- EW -->
<div class="status-box operating" id="trainEW">
  <div class="status-label">East West Line</div>
  <div class="status-message" id="statusMsgEW">Loading...</div>
</div>

<script>

/* ================= JSON ================= */
const NS_JSON = "https://wesutdgames.github.io/status/ns.json";
const EW_JSON = "https://wesutdgames.github.io/status/ew.json";

/* ================= DOT CONTROL (SAFE) ================= */
function handleDot(box, status) {
  const old = box.querySelector(".status-dot");
  if (old) old.remove();

  if (status === "stopped") {
    const dot = document.createElement("span");
    dot.className = "status-dot";
    box.appendChild(dot);
  }
}

/* ================= NS ================= */
async function updateNS() {
  const box = document.getElementById("trainNS");
  const msg = document.getElementById("statusMsgNS");

  try {
    const res = await fetch(NS_JSON + "?t=" + Date.now());
    const row = await res.json();

    let status = row?.status?.toLowerCase();
    let message = row?.en;

    if (!status || !message) {
      const h = new Date().getHours();

      if (h >= 6 && h < 22) {
        status = "operating";
        message = "North-South line is operating";
      } else if (h >= 22) {
        status = "finished";
        message = "Service finished";
      } else {
        status = "construction";
        message = "Maintenance mode";
      }
    }

    handleDot(box, status);

    msg.textContent = message;
    box.className = "status-box " + status;

  } catch {
    msg.textContent = "No internet";
    box.className = "status-box stopped";
    handleDot(box, "stopped");
  }
}

/* ================= EW ================= */
async function updateEW() {
  const box = document.getElementById("trainEW");
  const msg = document.getElementById("statusMsgEW");

  try {
    const res = await fetch(EW_JSON + "?t=" + Date.now());
    const row = await res.json();

    let status = row?.status?.toLowerCase();
    let message = row?.en;

    if (!status || !message) {
      const h = new Date().getHours();

      if (h >= 6 && h < 22) {
        status = "operating";
        message = "East-West line is operating";
      } else if (h >= 22) {
        status = "finished";
        message = "Service finished";
      } else {
        status = "construction";
        message = "Maintenance mode";
      }
    }

    handleDot(box, status);

    msg.textContent = message;
    box.className = "status-box " + status;

  } catch {
    msg.textContent = "No internet";
    box.className = "status-box stopped";
    handleDot(box, "stopped");
  }
}

/* ================= LOOP ================= */
function updateAll() {
  updateNS();
  updateEW();
}

updateAll();
setInterval(updateAll, 60000);

</script>

</body>
</html>
