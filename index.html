<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<title>የባቡር እንቅስቃሴ ሁኔታ - NS & EW</title>

<style>
/* ===== RESET & BASE ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Roboto, 'Arial', sans-serif;
  background: none; /* ← completely removed */
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  gap: 30px;
  padding: 20px;
}
/* Language Selector */
#langSelect {
  margin-bottom: 5px;
  font-size: 16px;
  padding: 8px 14px;
  border-radius: 12px;
  background-color: #f3f4f6;
  color: #111827;
  font-weight: 500;
  cursor: pointer;
}
/* ===== WELCOME BANNER – fancy upgrade ===== */
#welcomeBanner {
  width: 100%;
  max-width: 1000px;
  background: #F7AE05
;
  border-radius: 50px;
  padding: 16px 24px;
  font-size: 1.6rem;
  color: white;
  text-align: center;
  box-shadow: 0 15px 25px -10px rgba(0,50,80,0.2);
  border: 1px solid rgba(255,255,255,0.8);
  font-weight: 600;
  letter-spacing: 1px;
  backdrop-filter: blur(2px);
  transition: transform 0.2s;
}
#welcomeBanner:hover {
  transform: scale(1.01);
  box-shadow: 0 20px 30px -8px #1a4e63;
}

/* ===== STATUS BOXES – modern card style ===== */
.status-box {
  position: relative;
  background: white;
  border-radius: 30px;
  box-shadow: 0 20px 35px -10px rgba(0,30,40,0.3), inset 0 -1px 0 rgba(0,0,0,0.05);
  width: 480px;
  max-width: 90vw;
  display: flex;
  overflow: hidden;
  font-size: 1.1rem;
  transition: all 0.25s ease;
  border: 1px solid rgba(255,255,255,0.7);
}
.status-box:hover {
  transform: translateY(-6px);
  box-shadow: 0 28px 40px -8px #0a3340;
}

/* ===== LABEL STYLES ===== */
.status-label {
  width: 28%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  text-align: center;
  border-right: 2px solid rgba(255,255,255,0.6);
  padding: 20px 8px;
  font-size: 1.25rem;
  color: white;
  text-shadow: none;
  word-break: break-word;
}

/* NS label – sky blue */
#trainNS .status-label {
  background: #0924ED;
  box-shadow: none;
}

/* EW label – light green */
#trainEW .status-label {
  background: #05F714;
  box-shadow: none);
}

/* ===== MESSAGE AREA ===== */
.status-message {
  width: 72%;
  padding: 24px 18px;
  text-align: center;
  font-weight: 500;
  line-height: 1.5;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(2px);
}

/* Status colors – original, enhanced with glow */
.operating .status-message { color: #0f7b3a; text-shadow: 0 0 8px rgba(15,123,58,0.2); }
.stopped .status-message { color: #c0392b; text-shadow: 0 0 8px rgba(192,57,43,0.2); }
.finished .status-message { color: #1f618d; text-shadow: 0 0 8px rgba(31,97,141,0.2); }
.returning .status-message { color: #d35400; text-shadow: 0 0 8px rgba(211,84,0,0.2); }
.construction .status-message { color: #884ea0; text-shadow: 0 0 8px rgba(136,78,160,0.2); }

/* ===== RED DOT – more vibrant ===== */
.status-dot {
  position: absolute;
  top: 14px;
  right: 18px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #ff3b3b;
  box-shadow: 0 0 12px #ff0000, 0 0 24px #ff4444;
  animation: pulse 0.8s infinite alternate ease-in-out;
  z-index: 2;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.9; }
  100% { transform: scale(1.3); opacity: 1; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 500px) {
  .status-box {
    flex-direction: column;
    width: 100%;
  }
  .status-label {
    width: 100%;
    border-right: none;
    border-bottom: 2px solid rgba(255,255,255,0.6);
    padding: 16px;
  }
  .status-message {
    width: 100%;
    padding: 20px;
  }
  #welcomeBanner {
    font-size: 1.3rem;
    padding: 12px 16px;
  }
}

/* NO background pattern or color on body */
</style>
</head>

<body>

<div id="welcomeBanner">
  እንኳን ወደ አዲስ አበባ ቀላል ባቡር ትራንስፖርት በደህና መጡ
</div>

<div class="status-box operating" id="trainNS">
  <div class="status-label">የቃሊቲ - ፒያሳ</div>
  <div class="status-message" id="statusMsgNS">⏳ Loading...</div>
</div>

<div class="status-box operating" id="trainEW">
  <div class="status-label">የአያት - ጦርሐይሎች</div>
  <div class="status-message" id="statusMsgEW">⏳ Loading...</div>
</div>

<script>
/* ===============================
   JSON URLs
=============================== */
const NS_JSON = "https://wesutdgames.github.io/status/ns.json";
const EW_JSON = "https://wesutdgames.github.io/status/ew.json";

/* ===============================
   BASE64 DECODER
=============================== */
function decodeBase64UTF8(base64) {
  try {
    const binary = atob(base64);
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    return new TextDecoder("utf-8").decode(bytes);
  } catch {
    return "⚠️ መልዕክት አልተነበበም";
  }
}

/* ===============================
   NS UPDATE
=============================== */
async function updateNS() {
  const box = document.getElementById("trainNS");
  const msgEl = document.getElementById("statusMsgNS");

  try {
    const res = await fetch(NS_JSON + "?t=" + Date.now());
    const row = await res.json();

    let status = row?.status?.toLowerCase();
    let message = decodeBase64UTF8(row?.am || "");

    if (!status || !message) {
      const hour = new Date().getHours();

      if (hour >= 6 && hour < 22) {
        status = "operating";
        message = "🚆 ሙሉ አገልግሎት እየሰጠ ነው";
      } else if (hour >= 22) {
        status = "finished";
        message = "🏁 አገልግሎት ተጠናቋል";
      } else if (hour < 5) {
        status = "construction";
        message = "🚧 የጥገና ስራ እየተካሄደ ነው";
      } else {
        status = "returning";
        message = "🚆 ለመጀመር በዝግጅት ላይ";
      }
    }

    box.className = "status-box " + status;
    msgEl.textContent = message;

    box.querySelector(".status-dot")?.remove();
    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

  } catch {
    msgEl.textContent = "❌ ኢንተርኔት የለም";
    box.className = "status-box stopped";
  }
}

/* ===============================
   EW UPDATE
=============================== */
async function updateEW() {
  const box = document.getElementById("trainEW");
  const msgEl = document.getElementById("statusMsgEW");

  try {
    const res = await fetch(EW_JSON + "?t=" + Date.now());
    const row = await res.json();

    let status = row?.status?.toLowerCase();
    let message = decodeBase64UTF8(row?.am || "");

    if (!status || !message) {
      const hour = new Date().getHours();

      if (hour >= 6 && hour < 22) {
        status = "operating";
        message = "🚆 ሙሉ አገልግሎት እየሰጠ ነው";
      } else if (hour >= 22) {
        status = "finished";
        message = "🏁 አገልግሎት ተጠናቋል";
      } else if (hour < 5) {
        status = "construction";
        message = "🚧 የጥገና ስራ እየተካሄደ ነው";
      } else {
        status = "returning";
        message = "🚆 ለመጀመር በዝግጅት ላይ";
      }
    }

    box.className = "status-box " + status;
    msgEl.textContent = message;

    box.querySelector(".status-dot")?.remove();
    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

  } catch {
    msgEl.textContent = "❌ ኢንተርኔት የለም";
    box.className = "status-box stopped";
  }
}

/* ===============================
   LOAD
=============================== */
function updateAll() {
  updateNS();
  updateEW();
}

updateAll();
setInterval(updateAll, 60000);
</script>

</body>
</html>
