<h2>Test </h2>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JSON Reader</title>
</head>

<body>

<h1 id="message">Loading...</h1>
<p id="time"></p>

<script>

async function loadJSON() {

  try {

    const url = "data.json?nocache=" + new Date().getTime();

    const response = await fetch(url);
    const data = await response.json();

    document.getElementById("message").textContent = data.message;
    document.getElementById("time").textContent = "Updated: " + data.updated;

  } catch (error) {

    document.getElementById("message").textContent = "Error loading JSON";

  }

}

loadJSON();

setInterval(loadJSON, 5000); // refresh every 5 seconds

</script>

</body>
</html>
