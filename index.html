<script>

/* ===============================
   GITHUB JSON URL
=============================== */

const NS_JSON =
"https://wesutdgames.github.io/status/ns.json";

const EW_JSON =
"https://wesutdgames.github.io/status/ew.json";


/* =============================
   FUNCTION: Update NS Line
============================= */

async function updateNS(lang) {

  const box = document.getElementById("trainNS");
  const msgEl = document.getElementById("statusMsgNS");

  try {

    const response =
    await fetch(NS_JSON + "?nocache=" + Date.now());

    const row = await response.json();

    let status = row?.Status?.toLowerCase();

    let message =
      lang === "am" ? row?.Amharic :
      lang === "en" ? row?.English :
      row?.Oromo;

    if (!status || !message) {

      const hour = new Date().getHours();

      if (hour >= 6 && hour < 22) {

        status = "operating";

        message = {
          am:"🚆 የቃሊቲ መስመር ባቡር ሙሉ አገልግሎት እየሰጠ ይገኛል",
          en:"🚆 The North-south line train is currently providing full service",
          or:"🚆 Daandii Kaliti irratti konkolaataa guutuu tajaajila kennaa jira"
        }[lang];

      } else if (hour >= 22 && hour < 24) {

        status = "finished";

        message = {
          am:"🏁 የቃሊቲ መስመር መደበኛ የባቡር አገልግሎት ተጠናቋል!",
          en:"🏁 The regular train service on the North-south line has been completed!",
          or:"🏁 Tajaajilli konkolaataa daandii Kaliti irratti yeroo duraa xumurameera!"
        }[lang];

      } else if (hour >= 0 && hour < 5) {

        status = "construction";

        message = {
          am:"🚧 በቃሊቲ መስመር መደበኛ የጥገና ስራ እየተካሄደ ይገኛል",
          en:"🚧 Regular maintenance work is currently underway on the North-south line",
          or:"🚧 Dalagaa sirreessaa yeroo ammaa daandii Kaliti irratti gaggeeffamaa jira"
        }[lang];

      } else {

        status = "returning";

        message = {
          am:"🚆 የቃሊቲ መስመር የባቡር አገልግሎት ለመጀመር በዝግጅት ላይ ይገኛል",
          en:"🚆 The North-south line train service is being prepared to start",
          or:"🚆 Tajaajilli konkolaataa daandii Kaliti jalqabuu akka qabu qophaa’aa jira"
        }[lang];

      }

    }

    const oldDot = box.querySelector(".status-dot");
    if (oldDot) oldDot.remove();

    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

    msgEl.textContent = message;
    box.className = "status-box " + status;

  }

  catch (e) {

    msgEl.textContent =
      lang === "am" ? "❌📶 እባክዎ Wi-Fi ወይም ዳታ ያብሩ" :
      lang === "en" ? "❌📶 Please turn on Wi-Fi or data." :
      "❌📶 Mee Wi-Fi ykn data banaa.";

    box.className = "status-box stopped";

  }

}

/* =============================
   UPDATE BOTH LINES
============================= */

function updateAllLines() {

  const lang =
  document.getElementById("langSelect").value;

  updateNS(lang);
  updateEW(lang);

}


/* =============================
   INITIAL LOAD
============================= */

updateLanguage();
updateAllLines();

setInterval(updateAllLines,60000);


/* =============================
   LANGUAGE SELECTOR
============================= */

document
.getElementById("langSelect")
.addEventListener("change",()=>{

updateLanguage();
updateAllLines();

});

</script>
