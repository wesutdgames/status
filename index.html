<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Train Operation Status - NS & EW Lines</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 10vh;
  margin: 0;
  gap: 10px;
}

/* ===== WELCOME BANNER ===== */
#welcomeBanner{
  width: 100%;
  max-width: 1000px;
  background: #f3f4f6;
  border-radius: 10px; 
  padding: 4px 0;
  font-family: Arial, sans-serif;
  font-size: 18px;
  color: #2d3436;
  text-align: center;
  z-index: 9999;
  border-bottom: 1px none;
  box-shadow: 0 1px 0 rgba(0,0,0,0.00), 0 3px 6px rgba(0,0,0,0.0);
}

/* Language Selector */
#langSelect {
  margin-bottom: 5px;
  font-size: 16px;
  padding: 8px 14px;
  border-radius: 12px;
  background-color: #f3f4f6;
  color: #111827;
  font-weight: 500;
  cursor: pointer;
}

/* Status box */
.status-box {
  position: relative;
  background: white;
  border-radius: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.15);
  width: 100%;
  max-width: 1000px;
  display: flex;
  flex-wrap: wrap;
  font-size: 18px;
  justify-content: center; 
}

/* Left label */
.status-label {
  width: 25%;
  background: #cdcfd1;
  display: flex;
  align-items: center;
  text-align: center;
  justify-content: center;
  color: black;
  font-weight: normal;
  font-size: 18px;
  border-right: 2px solid #ddd;
}

/* Right message */
.status-message {
  width: 75%;
  padding: 20px;
  text-align: center;
}

/* Status colors */
.operating .status-message { color: green; }
.stopped .status-message { color: red; }
.finished .status-message { color: blue; }
.returning .status-message { color: orange; }
.construction .status-message { color: purple; }

/* Glowing red dot */
.status-dot {
  position: absolute;
  top: 6px;
  right: 10px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: red;
  box-shadow: 0 0 8px red, 0 0 16px red;
  animation: glow 0.5s infinite alternate;
}

@keyframes glow {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.4); opacity: 1; }
}
</style>
</head>
<body>

<!-- ===== WELCOME BANNER ===== -->
<div id="welcomeBanner">
  <span id="welcomeText">Loading...</span>
</div>

<!-- Language Selector -->
<select id="langSelect">
  <option value="am">አማርኛ</option>
  <option value="en" selected>English</option>
  <option value="or">Afaan Oromoo</option>
</select>

<!-- NS Line -->
<div class="status-box operating" id="trainNS">
  <div class="status-label" id="labelNS">NS LINE</div>
  <div class="status-message" id="statusMsgNS">Loading NS line status...</div>
</div>

<!-- EW Line -->
<div class="status-box operating" id="trainEW">
  <div class="status-label" id="labelEW">EW LINE</div>
  <div class="status-message" id="statusMsgEW">Loading EW line status...</div>
</div>

<script>
/* ===============================
   JSON FILES
=============================== */
const NS_JSON = "https://wesutdgames.github.io/status/ns.json";
const EW_JSON = "https://wesutdgames.github.io/status/ew.json";

/* ===============================
   WELCOME LANGUAGE MAP
=============================== */
const WELCOME_TEXT = {
  am: "እንኳን ወደ አዲስ አበባ ቀላል ባቡር ትራንስፖርት በደህና መጡ",
  en: "Welcome to Addis Ababa Light Rail",
  or: "Gara Geejjibaa Baabura Salphaa Addis Ababa baga nagaan dhuftan."
};

/* ===============================
   STATUS LABEL LANGUAGE MAP
=============================== */
const LABEL_TEXT = {
  NS: { am: "የቃሊቲ-ፒያሳ መስመር", en: "North South Line", or: "Daandii Kaabaa - Kibbaa" },
  EW: { am: "የአያት-ጦርሐይሎች መስመር", en: "East West Line", or: "Daandii Bahaa - Dhihaa" }
};

/* ===============================
   UPDATE BANNER & LABELS
=============================== */
function updateLanguage() {
  const lang = document.getElementById("langSelect").value;
  document.getElementById("welcomeText").textContent = WELCOME_TEXT[lang];
  document.getElementById("labelNS").textContent = LABEL_TEXT.NS[lang];
  document.getElementById("labelEW").textContent = LABEL_TEXT.EW[lang];
}

/* ===============================
   UPDATE NS STATUS
=============================== */
async function updateNS(lang) {
  const box = document.getElementById("trainNS");
  const msgEl = document.getElementById("statusMsgNS");

  try {
    const response = await fetch(NS_JSON + "?nocache=" + Date.now());
    const row = await response.json();

    let status = row?.Status?.toLowerCase();
    let message = lang === "am" ? row?.Amharic : lang === "en" ? row?.English : row?.Oromo;

    if (!status || !message) {
      const hour = new Date().getHours();
      if (hour >= 6 && hour < 22) {
        status = "operating";
        message = { am:"🚆 የቃሊቲ መስመር ባቡር ሙሉ አገልግሎት እየሰጠ ይገኛል",
                    en:"🚆 The North-south line train is currently providing full service",
                    or:"🚆 Daandii Kaliti irratti konkolaataa guutuu tajaajila kennaa jira" }[lang];
      } else if (hour >= 22 && hour < 24) {
        status = "finished";
        message = { am:"🏁 የቃሊቲ መስመር መደበኛ የባቡር አገልግሎት ተጠናቋል!",
                    en:"🏁 The regular train service on the North-south line has been completed!",
                    or:"🏁 Tajaajilli konkolaataa daandii Kaliti irratti yeroo duraa xumurameera!" }[lang];
      } else if (hour >= 0 && hour < 5) {
        status = "construction";
        message = { am:"🚧 በቃሊቲ መስመር መደበኛ የጥገና ስራ እየተካሄደ ይገኛል",
                    en:"🚧 Regular maintenance work is currently underway on the North-south line",
                    or:"🚧 Dalagaa sirreessaa yeroo ammaa daandii Kaliti irratti gaggeeffamaa jira" }[lang];
      } else {
        status = "returning";
        message = { am:"🚆 የቃሊቲ መስመር የባቡር አገልግሎት ለመጀመር በዝግጅት ላይ ይገኛል",
                    en:"🚆 The North-south line train service is being prepared to start",
                    or:"🚆 Tajaajilli konkolaataa daandii Kaliti jalqabuu akka qabu qophaa’aa jira" }[lang];
      }
    }

    const oldDot = box.querySelector(".status-dot");
    if (oldDot) oldDot.remove();
    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

    msgEl.textContent = message;
    box.className = "status-box " + status;

  } catch(e) {
    msgEl.textContent = lang === "am" ? "❌📶 እባክዎ Wi-Fi ወይም ዳታ ያብሩ" :
                      lang === "en" ? "❌📶 Please turn on Wi-Fi or data." :
                      "❌📶 Mee Wi-Fi ykn data banaa";
    box.className = "status-box stopped";
    if (!box.querySelector(".status-dot")) {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }
  }
}

/* ===============================
   UPDATE EW STATUS
=============================== */
async function updateEW(lang) {
  const box = document.getElementById("trainEW");
  const msgEl = document.getElementById("statusMsgEW");

  try {
    const response = await fetch(EW_JSON + "?nocache=" + Date.now());
    const row = await response.json();

    let status = row?.Status?.toLowerCase();
    let message = lang === "am" ? row?.Amharic : lang === "en" ? row?.English : row?.Oromo;

    if (!status || !message) {
      const hour = new Date().getHours();
      if (hour >= 6 && hour < 22) {
        status = "operating";
        message = { am:"🚆 በአያት መስመር ባቡር ሙሉ አገልግሎት እየሰጠ ይገኛል",
                    en:"🚆 The East-West line train is currently providing full service",
                    or:"🚆 Daandii Ayat irratti konkolaataa guutuu tajaajila kennaa jira" }[lang];
      } else if (hour >= 22 && hour < 24) {
        status = "finished";
        message = { am:"🏁 የአያት መስመር መደበኛ የባቡር አገልግሎት ተጠናቋል!",
                    en:"🏁 The regular train service on the East-West line has been completed!",
                    or:"🏁 Tajaajilli konkolaataa daandii Ayat irratti yeroo duraa xumurameera!" }[lang];
      } else if (hour >= 0 && hour < 5) {
        status = "construction";
        message = { am:"🚧 በአያት መስመር መደበኛ የጥገና ስራ እየተካሄደ ይገኛል",
                    en:"🚧 Regular maintenance work is currently underway on the East-West line",
                    or:"🚧 Dalagaa sirreessaa yeroo ammaa daandii Ayat irratti gaggeeffamaa jira" }[lang];
      } else {
        status = "returning";
        message = { am:"🚆 የአያት መስመር የባቡር አገልግሎት ለመጀመር በዝግጅት ላይ ይገኛል",
                    en:"🚆 The East-West line train service is being prepared to start",
                    or:"🚆 Tajaajilli konkolaataa daandii Ayat jalqabuu akka qabu qophaa’aa jira" }[lang];
      }
    }

    const oldDot = box.querySelector(".status-dot");
    if (oldDot) oldDot.remove();
    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

    msgEl.textContent = message;
    box.className = "status-box " + status;

  } catch(e) {
    msgEl.textContent = lang === "am" ? "❌📶 እባክዎ Wi-Fi ወይም ዳታ ያብሩ" :
                      lang === "en" ? "❌📶 Please turn on Wi-Fi or data." :
                      "❌📶 Mee Wi-Fi ykn data banaa";
    box.className = "status-box stopped";
    if (!box.querySelector(".status-dot")) {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }
  }
}

/* ===============================
   UPDATE BOTH LINES
=============================== */
function updateAllLines() {
  const lang = document.getElementById("langSelect").value;
  updateNS(lang);
  updateEW(lang);
}

/* ===============================
   INITIAL LOAD
=============================== */
updateLanguage();
updateAllLines();
setInterval(updateAllLines, 60000);

/* ===============================
   LANGUAGE SELECTOR EVENT
=============================== */
document.getElementById("langSelect")
        .addEventListener("change", () => {
            updateLanguage();
            updateAllLines();
        });
</script>
</body>
</html>
