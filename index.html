<h2>Test page biruk</h2>
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hello JSON</title>
</head>

<body>

<h1 id="message">Loading...</h1>
<p id="time"></p>

<script>

async function loadJSON() {
  try {

    const response = await fetch("./data.json");
    const data = await response.json();

    document.getElementById("message").textContent = data.message;
    document.getElementById("time").textContent = "Updated: " + data.updated;

  } catch (error) {

    console.log(error);
    document.getElementById("message").textContent = "Error loading JSON";

  }
}

loadJSON();

</script>

</body>
</html>
