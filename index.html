<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>የባቡር እንቅስቃሴ ሁኔታ - NS & EW</title>

<style>
/* ===== RESET & BASE ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Roboto, 'Arial', sans-serif;
  background: none; /* ← completely removed */
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  gap: 30px;
  padding: 20px;
}
/* Language Selector */
#langSelect {
  margin-bottom: 5px;
  font-size: 16px;
  padding: 8px 14px;
  border-radius: 12px;
  background-color: #f3f4f6;
  color: #111827;
  font-weight: 500;
  cursor: pointer;
}
/* ===== WELCOME BANNER – fancy upgrade ===== */
#welcomeBanner {
  width: 100%;
  max-width: 1000px;
  background: #F7AE05
;
  border-radius: 50px;
  padding: 16px 24px;
  font-size: 1.6rem;
  color: white;
  text-align: center;
  box-shadow: 0 15px 25px -10px rgba(0,50,80,0.2);
  border: 1px solid rgba(255,255,255,0.8);
  font-weight: 600;
  letter-spacing: 1px;
  backdrop-filter: blur(2px);
  transition: transform 0.2s;
}
#welcomeBanner:hover {
  transform: scale(1.01);
  box-shadow: 0 20px 30px -8px #1a4e63;
}

/* ===== STATUS BOXES – modern card style ===== */
.status-box {
  position: relative;
  background: white;
  border-radius: 30px;
  box-shadow: 0 20px 35px -10px rgba(0,30,40,0.3), inset 0 -1px 0 rgba(0,0,0,0.05);
  width: 480px;
  max-width: 90vw;
  display: flex;
  overflow: hidden;
  font-size: 1.1rem;
  transition: all 0.25s ease;
  border: 1px solid rgba(255,255,255,0.7);
}
.status-box:hover {
  transform: translateY(-6px);
  box-shadow: 0 28px 40px -8px #0a3340;
}

/* ===== LABEL STYLES ===== */
.status-label {
  width: 28%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  text-align: center;
  border-right: 2px solid rgba(255,255,255,0.6);
  padding: 20px 8px;
  font-size: 1.25rem;
  color: white;
  text-shadow: none;
  word-break: break-word;
}

/* NS label – sky blue */
#trainNS .status-label {
  background: #0924ED;
  box-shadow: none;
}

/* EW label – light green */
#trainEW .status-label {
  background: #05F714;
  box-shadow: none);
}

/* ===== MESSAGE AREA ===== */
.status-message {
  width: 72%;
  padding: 24px 18px;
  text-align: center;
  font-weight: 500;
  line-height: 1.5;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(2px);
}

/* Status colors – original, enhanced with glow */
.operating .status-message { color: #0f7b3a; text-shadow: 0 0 8px rgba(15,123,58,0.2); }
.stopped .status-message { color: #c0392b; text-shadow: 0 0 8px rgba(192,57,43,0.2); }
.finished .status-message { color: #1f618d; text-shadow: 0 0 8px rgba(31,97,141,0.2); }
.returning .status-message { color: #d35400; text-shadow: 0 0 8px rgba(211,84,0,0.2); }
.construction .status-message { color: #884ea0; text-shadow: 0 0 8px rgba(136,78,160,0.2); }

/* ===== RED DOT – more vibrant ===== */
.status-dot {
  position: absolute;
  top: 14px;
  right: 18px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #ff3b3b;
  box-shadow: 0 0 12px #ff0000, 0 0 24px #ff4444;
  animation: pulse 0.8s infinite alternate ease-in-out;
  z-index: 2;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.9; }
  100% { transform: scale(1.3); opacity: 1; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 500px) {
  .status-box {
    flex-direction: column;
    width: 100%;
  }
  .status-label {
    width: 100%;
    border-right: none;
    border-bottom: 2px solid rgba(255,255,255,0.6);
    padding: 16px;
  }
  .status-message {
    width: 100%;
    padding: 20px;
  }
  #welcomeBanner {
    font-size: 1.3rem;
    padding: 12px 16px;
  }
}

/* NO background pattern or color on body */
</style>
</head>
<body>

<!-- ===== WELCOME BANNER ===== -->
<div id="welcomeBanner">
  <span id="welcomeText">Loading...</span>
</div>

<!-- Language Selector -->
<select id="langSelect">
  <option value="am">አማርኛ</option>
  <option value="en" selected>English</option>
  <option value="or">Afaan Oromoo</option>
</select>

<!-- NS Line -->
<div class="status-box operating" id="trainNS">
  <div class="status-label" id="labelNS">NS LINE</div>
  <div class="status-message" id="statusMsgNS">Loading NS line status...</div>
</div>

<!-- EW Line -->
<div class="status-box operating" id="trainEW">
  <div class="status-label" id="labelEW">EW LINE</div>
  <div class="status-message" id="statusMsgEW">Loading EW line status...</div>
</div>

<script>
/* ===============================
   JSON FILES
=============================== */
const NS_JSON = "https://wesutdgames.github.io/status/ns.json";
const EW_JSON = "https://wesutdgames.github.io/status/ew.json";

/* ===============================
   WELCOME LANGUAGE MAP
=============================== */
const WELCOME_TEXT = {
  am: "እንኳን ወደ አዲስ አበባ ቀላል ባቡር ትራንስፖርት በደህና መጡ",
  en: "Welcome to Addis Ababa Light Rail",
  or: "Gara Geejjibaa Baabura Salphaa Addis Ababa baga nagaan dhuftan."
};

/* ===============================
   STATUS LABEL LANGUAGE MAP
=============================== */
const LABEL_TEXT = {
  NS: { am: "የቃሊቲ-ፒያሳ መስመር", en: "North South Line", or: "Daandii Kaabaa - Kibbaa" },
  EW: { am: "የአያት-ጦርሐይሎች መስመር", en: "East West Line", or: "Daandii Bahaa - Dhihaa" }
};

/* ===============================
   UPDATE BANNER & LABELS
=============================== */
function updateLanguage() {
  const lang = document.getElementById("langSelect").value;
  document.getElementById("welcomeText").textContent = WELCOME_TEXT[lang];
  document.getElementById("labelNS").textContent = LABEL_TEXT.NS[lang];
  document.getElementById("labelEW").textContent = LABEL_TEXT.EW[lang];
}

/* ===============================
   UPDATE NS STATUS
=============================== */
async function updateNS(lang) {
  const box = document.getElementById("trainNS");
  const msgEl = document.getElementById("statusMsgNS");

  try {
    const response = await fetch(NS_JSON + "?nocache=" + Date.now());
    const row = await response.json();

    let status = row?.Status?.toLowerCase();
    let message = lang === "am" ? row?.Amharic : lang === "en" ? row?.English : row?.Oromo;

    if (!status || !message) {
      const hour = new Date().getHours();
      if (hour >= 6 && hour < 22) {
        status = "operating";
        message = { am:"🚆 የቃሊቲ መስመር ባቡር ሙሉ አገልግሎት እየሰጠ ይገኛል",
                    en:"🚆 The North-south line train is currently providing full service",
                    or:"🚆 Daandii Kaliti irratti konkolaataa guutuu tajaajila kennaa jira" }[lang];
      } else if (hour >= 22 && hour < 24) {
        status = "finished";
        message = { am:"🏁 የቃሊቲ መስመር መደበኛ የባቡር አገልግሎት ተጠናቋል!",
                    en:"🏁 The regular train service on the North-south line has been completed!",
                    or:"🏁 Tajaajilli konkolaataa daandii Kaliti irratti yeroo duraa xumurameera!" }[lang];
      } else if (hour >= 0 && hour < 5) {
        status = "construction";
        message = { am:"🚧 በቃሊቲ መስመር መደበኛ የጥገና ስራ እየተካሄደ ይገኛል",
                    en:"🚧 Regular maintenance work is currently underway on the North-south line",
                    or:"🚧 Dalagaa sirreessaa yeroo ammaa daandii Kaliti irratti gaggeeffamaa jira" }[lang];
      } else {
        status = "returning";
        message = { am:"🚆 የቃሊቲ መስመር የባቡር አገልግሎት ለመጀመር በዝግጅት ላይ ይገኛል",
                    en:"🚆 The North-south line train service is being prepared to start",
                    or:"🚆 Tajaajilli konkolaataa daandii Kaliti jalqabuu akka qabu qophaa’aa jira" }[lang];
      }
    }

    const oldDot = box.querySelector(".status-dot");
    if (oldDot) oldDot.remove();
    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

    msgEl.textContent = message;
    box.className = "status-box " + status;

  } catch(e) {
    msgEl.textContent = lang === "am" ? "❌📶 እባክዎ Wi-Fi ወይም ዳታ ያብሩ" :
                      lang === "en" ? "❌📶 Please turn on Wi-Fi or data." :
                      "❌📶 Mee Wi-Fi ykn data banaa";
    box.className = "status-box stopped";
    if (!box.querySelector(".status-dot")) {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }
  }
}

/* ===============================
   UPDATE EW STATUS
=============================== */
async function updateEW(lang) {
  const box = document.getElementById("trainEW");
  const msgEl = document.getElementById("statusMsgEW");

  try {
    const response = await fetch(EW_JSON + "?nocache=" + Date.now());
    const row = await response.json();

    let status = row?.Status?.toLowerCase();
    let message = lang === "am" ? row?.Amharic : lang === "en" ? row?.English : row?.Oromo;

    if (!status || !message) {
      const hour = new Date().getHours();
      if (hour >= 6 && hour < 22) {
        status = "operating";
        message = { am:"🚆 በአያት መስመር ባቡር ሙሉ አገልግሎት እየሰጠ ይገኛል",
                    en:"🚆 The East-West line train is currently providing full service",
                    or:"🚆 Daandii Ayat irratti konkolaataa guutuu tajaajila kennaa jira" }[lang];
      } else if (hour >= 22 && hour < 24) {
        status = "finished";
        message = { am:"🏁 የአያት መስመር መደበኛ የባቡር አገልግሎት ተጠናቋል!",
                    en:"🏁 The regular train service on the East-West line has been completed!",
                    or:"🏁 Tajaajilli konkolaataa daandii Ayat irratti yeroo duraa xumurameera!" }[lang];
      } else if (hour >= 0 && hour < 5) {
        status = "construction";
        message = { am:"🚧 በአያት መስመር መደበኛ የጥገና ስራ እየተካሄደ ይገኛል",
                    en:"🚧 Regular maintenance work is currently underway on the East-West line",
                    or:"🚧 Dalagaa sirreessaa yeroo ammaa daandii Ayat irratti gaggeeffamaa jira" }[lang];
      } else {
        status = "returning";
        message = { am:"🚆 የአያት መስመር የባቡር አገልግሎት ለመጀመር በዝግጅት ላይ ይገኛል",
                    en:"🚆 The East-West line train service is being prepared to start",
                    or:"🚆 Tajaajilli konkolaataa daandii Ayat jalqabuu akka qabu qophaa’aa jira" }[lang];
      }
    }

    const oldDot = box.querySelector(".status-dot");
    if (oldDot) oldDot.remove();
    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

    msgEl.textContent = message;
    box.className = "status-box " + status;

  } catch(e) {
    msgEl.textContent = lang === "am" ? "❌📶 እባክዎ Wi-Fi ወይም ዳታ ያብሩ" :
                      lang === "en" ? "❌📶 Please turn on Wi-Fi or data." :
                      "❌📶 Mee Wi-Fi ykn data banaa";
    box.className = "status-box stopped";
    if (!box.querySelector(".status-dot")) {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }
  }
}

/* ===============================
   UPDATE BOTH LINES
=============================== */
function updateAllLines() {
  const lang = document.getElementById("langSelect").value;
  updateNS(lang);
  updateEW(lang);
}

/* ===============================
   INITIAL LOAD
=============================== */
updateLanguage();
updateAllLines();
setInterval(updateAllLines, 60000);

/* ===============================
   LANGUAGE SELECTOR EVENT
=============================== */
document.getElementById("langSelect")
        .addEventListener("change", () => {
            updateLanguage();
            updateAllLines();
        });
</script>
</body>
</html>
