<script>
const NS_JSON = "https://wesutdgames.github.io/status/ns.json";
const EW_JSON = "https://wesutdgames.github.io/status/ew.json";

let currentLang = "en";

function updateLanguage() {
  const select = document.getElementById("langSelect");
  if (select) currentLang = select.value || "en";
}

async function updateLine(jsonUrl, boxId, msgId, lineName) {
  const box = document.getElementById(boxId);
  const msgEl = document.getElementById(msgId);

  if (!box || !msgEl) return; // Safety: stop if elements not found

  try {
    const response = await fetch(jsonUrl + "?nocache=" + Date.now());
    const row = await response.json();

    let status = row?.Status?.toLowerCase();
    let message = currentLang === "am" ? row?.Amharic :
                  currentLang === "en" ? row?.English :
                  row?.Oromo;

    if (!status || !message) {
      const hour = new Date().getHours();
      status = hour >= 6 && hour < 22 ? "operating" :
               hour >= 22 && hour < 24 ? "finished" :
               hour >= 0 && hour < 5 ? "construction" : "returning";

      const messages = {
        NS: {
          operating: { en:"🚆 NS Line full service", am:"🚆 የቃሊቲ መስመር ሙሉ አገልግሎት", or:"🚆 NS Line guutuu tajaajila" },
          finished: { en:"🏁 NS Line service finished", am:"🏁 የቃሊቲ መስመር ተጠናቋል", or:"🏁 NS Line xumurame" },
          construction: { en:"🚧 NS Line under maintenance", am:"🚧 በቃሊቲ መስመር ጥገና", or:"🚧 NS Line sirreessaa" },
          returning: { en:"🚆 NS Line preparing", am:"🚆 የቃሊቲ መስመር በዝግጅት", or:"🚆 NS Line qophaa’aa jira" }
        },
        EW: {
          operating: { en:"🚆 EW Line full service", am:"🚆 የአያት መስመር ሙሉ አገልግሎት", or:"🚆 EW Line guutuu tajaajila" },
          finished: { en:"🏁 EW Line service finished", am:"🏁 የአያት መስመር ተጠናቋል", or:"🏁 EW Line xumurame" },
          construction: { en:"🚧 EW Line under maintenance", am:"🚧 በአያት መስመር ጥገና", or:"🚧 EW Line sirreessaa" },
          returning: { en:"🚆 EW Line preparing", am:"🚆 የአያት መስመር በዝግጅት", or:"🚆 EW Line qophaa’aa jira" }
        }
      };

      message = messages[lineName][status][currentLang];
    }

    const oldDot = box.querySelector(".status-dot");
    if (oldDot) oldDot.remove();
    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

    msgEl.textContent = message;
    box.className = "status-box " + status;

  } catch (e) {
    console.error("Fetch failed:", jsonUrl, e);
    msgEl.textContent = currentLang === "am" ? "❌📶 እባክዎ Wi-Fi ወይም ዳታ ያብሩ" :
                        currentLang === "en" ? "❌📶 Please turn on Wi-Fi or data." :
                        "❌📶 Mee Wi-Fi ykn data banaa";
    if(box) box.className = "status-box stopped";
  }
}

function updateAllLines() {
  updateLine(NS_JSON, "trainNS", "statusMsgNS", "NS");
  updateLine(EW_JSON, "trainEW", "statusMsgEW", "EW");
}

document.addEventListener("DOMContentLoaded", () => {
  updateLanguage();
  updateAllLines();
  setInterval(updateAllLines, 60000);

  const langSelect = document.getElementById("langSelect");
  if (langSelect) {
    langSelect.addEventListener("change", () => {
      updateLanguage();
      updateAllLines();
    });
  }
});
</script>
