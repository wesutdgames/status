<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<title>የባቡር እንቅስቃሴ ሁኔታ - NS & EW</title>

<style>
/* ===== RESET & BASE ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Roboto, 'Arial', sans-serif;
  background: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  gap: 30px;
  padding: 20px;
}

/* ===== WELCOME BANNER ===== */
#welcomeBanner {
  width: 100%;
  max-width: 1000px;
  background: #F7AE05;
  border-radius: 50px;
  padding: 16px 24px;
  font-size: 1.6rem;
  color: white;
  text-align: center;
  box-shadow: 0 15px 25px -10px rgba(0,50,80,0.2);
  font-weight: 600;
}

/* ===== STATUS BOXES ===== */
.status-box {
  position: relative;
  background: white;
  border-radius: 30px;
  box-shadow: 0 20px 35px -10px rgba(0,30,40,0.3);
  width: 480px;
  max-width: 90vw;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== LABEL ===== */
.status-label {
  width: 100%;
  padding: 18px;
  font-weight: 700;
  text-align: center;
  font-size: 1.25rem;
  color: white;
}

#trainNS .status-label {
  background: #0924ED;
}

#trainEW .status-label {
  background: #05F714;
}

/* ===== MESSAGE ===== */
.status-message {
  width: 100%;
  padding: 24px 18px;
  text-align: center;
  font-weight: 500;
  font-size: 1.5rem;
}

/* ===== STATUS COLORS ===== */
.operating .status-message { color: #0f7b3a; }
.stopped .status-message { color: #c0392b; }
.finished .status-message { color: #1f618d; }
.returning .status-message { color: #d35400; }
.construction .status-message { color: #884ea0; }

/* ===== BLINKING LIVE INDICATOR ===== */
.status-dot {
  position: absolute;
  top: 14px;
  right: 18px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #ff3b3b;
  box-shadow: 0 0 12px #ff0000, 0 0 24px #ff4444;
  animation: pulse 0.8s infinite alternate ease-in-out;
  z-index: 2;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.4); opacity: 1; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 500px) {
  .status-box {
    width: 100%;
  }
}
</style>
</head>

<body>

<div id="welcomeBanner">
  <span>
    እንኳን ወደ አዲስ አበባ ቀላል ባቡር ትራንስፖርት በደህና መጡ
  </span>
</div>

<!-- NS -->
<div class="status-box operating" id="trainNS">
  <div class="status-label">
    የቃሊቲ - ፒያሳ መስመር
  </div>
  <div class="status-message" id="statusMsgNS">
    የNS መስመር ሁኔታ በመጫን ላይ...
  </div>
</div>

<!-- EW -->
<div class="status-box operating" id="trainEW">
  <div class="status-label">
    የአያት - ጦርሐይሎች መስመር
  </div>
  <div class="status-message" id="statusMsgEW">
    የEW መስመር ሁኔታ በመጫን ላይ...
  </div>
</div>

<script>
/* ===============================
   JSON URLs
=============================== */
const NS_JSON = "https://wesutdgames.github.io/status/ns.json";
const EW_JSON = "https://wesutdgames.github.io/status/ew.json";

/* ===============================
   BASE64 DECODER
=============================== */
function decodeBase64UTF8(base64) {
  try {
    const binary = atob(base64);
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    return new TextDecoder("utf-8").decode(bytes);
  } catch {
    return "⚠️ መልዕክት አልተነበበም";
  }
}

/* =============================
   NS LINE
============================= */
async function updateNS() {

  const box = document.getElementById("trainNS");
  const msgEl = document.getElementById("statusMsgNS");

  try {

    const res = await fetch(NS_JSON + "?t=" + Date.now());
    const row = await res.json();

    let status = row?.status?.toLowerCase();
    let message = decodeBase64UTF8(row?.am || "");

    if (!status || !message) {

      const hour = new Date().getHours();

      if (hour >= 6 && hour < 22) {
        status = "operating";
        message = "🚆 የቃሊቲ - ፒያሳ መስመር ባቡር ሙሉ አገልግሎት እየሰጠ ይገኛል";
      }
      else if (hour >= 22 && hour < 24) {
        status = "finished";
        message = "🏁 መደበኛ አገልግሎት ተጠናቋል!";
      }
      else if (hour >= 0 && hour < 5) {
        status = "construction";
        message = "🚧 የጥገና ስራ እየተካሄደ ነው";
      }
      else {
        status = "returning";
        message = "🚆 ለመጀመር በዝግጅት ላይ ነው";
      }
    }

    /* ===== LIVE DOT (RESTORED SAFE) ===== */
    const oldDot = box.querySelector(".status-dot");
    if (oldDot) oldDot.remove();

    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

    msgEl.textContent = message;
    box.className = "status-box " + status;

  } catch {
    msgEl.textContent = "❌📶 እባክዎ Wi-Fi ያብሩ";
    box.className = "status-box stopped";

    const dot = document.createElement("span");
    dot.className = "status-dot";
    box.appendChild(dot);
  }
}

/* =============================
   EW LINE
============================= */
async function updateEW() {

  const box = document.getElementById("trainEW");
  const msgEl = document.getElementById("statusMsgEW");

  try {

    const res = await fetch(EW_JSON + "?t=" + Date.now());
    const row = await res.json();

    let status = row?.status?.toLowerCase();
    let message = decodeBase64UTF8(row?.am || "");

    if (!status || !message) {

      const hour = new Date().getHours();

      if (hour >= 6 && hour < 22) {
        status = "operating";
        message = "🚆 በአያት መስመር ሙሉ አገልግሎት እየሰጠ ነው";
      }
      else if (hour >= 22 && hour < 24) {
        status = "finished";
        message = "🏁 መደበኛ አገልግሎት ተጠናቋል!";
      }
      else if (hour >= 0 && hour < 5) {
        status = "construction";
        message = "🚧 የጥገና ስራ እየተካሄደ ነው";
      }
      else {
        status = "returning";
        message = "🚆 ለመጀመር በዝግጅት ላይ ነው";
      }
    }

    const oldDot = box.querySelector(".status-dot");
    if (oldDot) oldDot.remove();

    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

    msgEl.textContent = message;
    box.className = "status-box " + status;

  } catch {
    msgEl.textContent = "❌📶 እባክዎ Wi-Fi ያብሩ";
    box.className = "status-box stopped";

    const dot = document.createElement("span");
    dot.className = "status-dot";
    box.appendChild(dot);
  }
}

/* LOAD */
function updateAllLines(){
  updateNS();
  updateEW();
}

updateAllLines();
setInterval(updateAllLines, 60000);
</script>

</body>
</html>
